<!DOCTYPE html>
<html lang="es-CL">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puelche HC — Portal de herramientas</title>
<meta name="description" content="Portal interno de Puelche HC: acceso a las herramientas web construidas para el equipo.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:    #191919;
    --paper:  #FDFCFA;
    --line:   #E2DFD8;
    --muted:  #7A7568;
    --green:  #4E5D3E;
    --green-bg: #EEF0E6;
    --card:   #FFFFFF;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  a{ color: inherit; }

  /* ---------- Header ---------- */

  header{
    border-bottom: 1px solid var(--line);
    padding: 40px 40px 0;
  }

  .header-top{
    max-width: 920px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    padding-bottom: 32px;
  }

  .logo img{
    height: 40px;
    width: auto;
    display: block;
  }

  .header-tag{
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .header-body{
    max-width: 920px;
    margin: 0 auto;
    padding: 40px 0 44px;
    border-top: 1px solid var(--line);
  }

  h1.title{
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    font-size: clamp(30px, 4vw, 42px);
    line-height: 1.15;
    margin: 0 0 14px;
  }

  h1.title em{
    font-style: italic;
    color: var(--green);
  }

  .lede{
    font-size: 16px;
    line-height: 1.65;
    color: var(--muted);
    max-width: 56ch;
    margin: 0;
  }

  /* ---------- Main / tool grid ---------- */

  main{
    max-width: 920px;
    margin: 0 auto;
    padding: 52px 40px 100px;
  }

  .section-head{
    display:flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 26px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .section-head h2{
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink);
    margin: 0;
  }

  .count{
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  #tool-grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
  }

  .empty-state{
    grid-column: 1 / -1;
    background: var(--card);
    padding: 48px 24px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }

  .card{
    display:flex;
    flex-direction: column;
    text-decoration: none;
    background: var(--card);
    padding: 30px 28px;
    transition: background 0.16s ease;
  }

  .card:hover, .card:focus-visible{
    background: var(--green-bg);
  }

  .card:focus-visible{
    outline: 2px solid var(--green);
    outline-offset: -2px;
  }

  .card-icon{
    width: 26px;
    height: 26px;
    color: var(--green);
    margin-bottom: 20px;
  }

  .card-category{
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--green);
    margin: 0 0 10px;
  }

  .card-title{
    font-family: 'Playfair Display', serif;
    font-weight: 500;
    font-size: 21px;
    margin: 0 0 10px;
    color: var(--ink);
  }

  .card-desc{
    font-size: 14px;
    line-height: 1.55;
    color: var(--muted);
    margin: 0 0 26px;
    flex-grow: 1;
  }

  .card-footer{
    display:flex;
    align-items:center;
    justify-content: space-between;
    padding-top: 16px;
    border-top: 1px solid var(--line);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
  }

  .card-domain{
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 62%;
  }

  .card-open{
    color: var(--ink);
    font-weight: 500;
    white-space: nowrap;
  }

  .card:hover .card-open, .card:focus-visible .card-open{
    color: var(--green);
  }

  /* ---------- Footer ---------- */

  footer{
    border-top: 1px solid var(--line);
    padding: 28px 40px 40px;
    text-align:center;
  }

  footer p{
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin: 0;
    letter-spacing: 0.04em;
  }

  @media (max-width: 520px){
    header{ padding: 28px 22px 0; }
    .header-body{ padding: 28px 0 32px; }
    main{ padding: 36px 22px 72px; }
  }
</style>
</head>

    calendar: '<svg viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="20" height="18" rx="1.5"/><path d="M3 10.5h20"/><path d="M8 2.5v5"/><path d="M18 2.5v5"/><path d="M8 15h3"/><path d="M8 19h6"/></svg>'
  };

  function domainFromUrl(url){
    try{
      const u = new URL(url);
      return u.hostname + (u.pathname === "/" ? "" : u.pathname.replace(/\/$/, ""));
    }catch(e){
      return url;
    }
  }

  function render(){
    const grid = document.getElementById('tool-grid');
    const count = document.getElementById('tool-count');
    count.textContent = TOOLS.length + (TOOLS.length === 1 ? " herramienta" : " herramientas");

    if(TOOLS.length === 0){
      grid.innerHTML = '<div class="empty-state">Todavía no hay herramientas cargadas.</div>';
      return;
    }

    grid.innerHTML = TOOLS.map(tool => `
      <a class="card" href="${tool.url}" target="_blank" rel="noopener noreferrer">
        <div class="card-icon">${ICONS[tool.icon] || ICONS.proposal}</div>
        <p class="card-category">${tool.category}</p>
        <h3 class="card-title">${tool.name}</h3>
        <p class="card-desc">${tool.description}</p>
        <div class="card-footer">
          <span class="card-domain">${domainFromUrl(tool.url)}</span>
          <span class="card-open">Abrir →</span>
        </div>
      </a>
    `).join('');
  }

  render();
</script>

</body>
</html>
